<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>具身智能刷题</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* =============================================
   1. CSS Reset + Variables
   ============================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #4F46E5;
  --primary-light: #EEF2FF;
  --primary-dark: #3730A3;
  --secondary: #818CF8;
  --correct: #059669;
  --correct-light: #ECFDF5;
  --wrong: #EF4444;
  --wrong-light: #FEF2F2;
  --wrong-emphasis: #F97316;
  --bg: #F5F3FF;
  --card: #FFFFFF;
  --text: #312E81;
  --text-secondary: #6B7280;
  --border: #E0E7FF;
  --shadow-sm: 0 1px 2px rgba(79,70,229,0.06), 0 1px 3px rgba(79,70,229,0.1);
  --shadow-md: 0 4px 6px rgba(79,70,229,0.05), 0 2px 4px rgba(79,70,229,0.08);
  --shadow-lg: 0 10px 15px rgba(79,70,229,0.06), 0 4px 6px rgba(79,70,229,0.1);
  --shadow-inner: inset 0 2px 4px rgba(79,70,229,0.06);
  --radius-sm: 12px;
  --radius-md: 16px;
  --radius-lg: 20px;
  --radius-xl: 24px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

/* =============================================
   2. Body + App Container
   ============================================= */
html, body {
  height: 100%;
}

body {
  font-family: 'Baloo 2', system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
  background-color: var(--bg);
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  display: flex;
  justify-content: center;
  overscroll-behavior: contain;
}

#app {
  width: 100%;
  max-width: 430px;
  min-height: 100vh;
  position: relative;
  background-color: var(--bg);
}

/* =============================================
   3. View Switching
   ============================================= */
.view {
  display: none;
  padding: 16px 16px 100px 16px;
}

.view.active {
  display: block;
}

/* =============================================
   4. Bottom Navigation
   ============================================= */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  background-color: var(--card);
  border-top: 1px solid var(--border);
  padding: 8px 0 calc(8px + var(--safe-bottom));
  z-index: 50;
  box-shadow: 0 -4px 20px rgba(79,70,229,0.08);
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  cursor: pointer;
  padding: 4px 12px;
  color: var(--text-secondary);
  transition: color 0.2s ease;
  -webkit-tap-highlight-color: transparent;
}

.nav-item.active {
  color: var(--primary);
}

.nav-icon {
  font-size: 22px;
  line-height: 1;
}

.nav-label {
  font-size: 11px;
  font-weight: 500;
}

/* =============================================
   5. Quiz View
   ============================================= */
.quiz-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

#quiz-category {
  font-size: 13px;
  font-weight: 600;
  color: var(--primary);
  background: var(--primary-light);
  padding: 4px 12px;
  border-radius: 12px;
}

#quiz-progress-text {
  font-size: 13px;
  color: var(--text-secondary);
}

.progress-bar {
  width: 100%;
  height: 4px;
  background-color: var(--border);
  border-radius: 2px;
  margin-bottom: 20px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background-color: var(--primary);
  border-radius: 2px;
  width: 0%;
  transition: width 0.4s ease;
}

#quiz-question {
  font-size: 17px;
  line-height: 1.6;
  font-weight: 500;
  margin-bottom: 20px;
  padding: 0 4px;
}

#quiz-options {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.quiz-option {
  padding: 16px;
  min-height: 48px;
  border: 2.5px solid var(--border);
  border-radius: var(--radius-md);
  font-size: 16px;
  background-color: var(--card);
  cursor: pointer;
  transition: all 0.2s ease;
  text-align: left;
  width: 100%;
  display: flex;
  align-items: center;
  color: var(--text);
  box-shadow: var(--shadow-sm);
}

.quiz-option:active {
  transform: scale(0.97);
  box-shadow: var(--shadow-inner);
}

.quiz-option:active {
  transform: scale(0.98);
}

/* =============================================
   6. Option States
   ============================================= */
.quiz-option.correct {
  background-color: var(--correct-light);
  border-color: var(--correct);
  color: var(--correct);
}

.quiz-option.wrong {
  background-color: var(--wrong-light);
  border-color: var(--wrong);
  color: var(--wrong);
}

.quiz-option.dimmed {
  opacity: 0.4;
}

.quiz-option.disabled {
  pointer-events: none;
}

/* =============================================
   7. Result Box
   ============================================= */
#quiz-result {
  display: none;
  padding: 14px;
  border-radius: 12px;
  margin-top: 16px;
  font-size: 14px;
  line-height: 1.5;
}

#quiz-result.show {
  display: block;
}

#quiz-result.correct-result {
  background-color: var(--correct-light);
  color: var(--correct);
}

#quiz-result.wrong-result {
  background-color: var(--wrong-light);
  color: var(--wrong);
}

.exam-result {
  padding: 20px;
  background-color: var(--card);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-lg);
  overflow-y: auto;
  max-height: 60vh;
}

/* =============================================
   8. Buttons
   ============================================= */
.btn-primary {
  display: block;
  width: 100%;
  padding: 16px;
  font-size: 18px;
  font-weight: 700;
  min-height: 48px;
  background-color: var(--primary);
  color: #ffffff;
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(79,70,229,0.3);
  transition: all 0.2s ease;
}

.btn-primary:active {
  transform: scale(0.97);
  box-shadow: 0 2px 6px rgba(79,70,229,0.2);
}

.btn-outline-primary {
  display: inline-block;
  padding: 10px 20px;
  font-size: 14px;
  font-weight: 500;
  min-height: 40px;
  background-color: var(--card);
  color: var(--primary);
  border: 2px solid var(--primary);
  border-radius: 10px;
  cursor: pointer;
  transition: background-color 0.2s ease;
}

.btn-outline-primary:active {
  background-color: var(--primary-light);
}

.btn-outline-danger {
  display: inline-block;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 500;
  background-color: var(--card);
  color: var(--wrong);
  border: 1.5px solid var(--wrong);
  border-radius: 8px;
  cursor: pointer;
  transition: background-color 0.2s ease;
}

.btn-outline-danger:active {
  background-color: var(--wrong-light);
}

.btn-danger {
  display: block;
  width: 100%;
  padding: 16px;
  font-size: 16px;
  font-weight: 600;
  min-height: 48px;
  background-color: var(--wrong);
  color: #ffffff;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  margin-top: 16px;
  transition: background-color 0.2s ease, transform 0.1s ease;
}

.btn-danger:active {
  transform: scale(0.98);
  background-color: #c62828;
}

/* =============================================
   9. Home View
   ============================================= */
.home-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 4px;
}

.home-subtitle {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 16px;
}

.progress-card {
  background-color: var(--primary-light);
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.progress-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.progress-card-label {
  font-size: 14px;
  font-weight: 600;
}

.progress-card-pct {
  font-size: 14px;
  font-weight: 700;
  color: var(--primary);
}

.home-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}

.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}

.stat-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background-color: var(--card);
  border-radius: var(--radius-sm);
  padding: 14px 8px;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: var(--shadow-sm);
}

.stat-card:active {
  transform: scale(0.97);
  box-shadow: var(--shadow-inner);
}

.stat-card:active {
  transform: scale(0.97);
}

.stat-card:hover {
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
}

.stat-value {
  font-size: 22px;
  font-weight: 700;
  color: var(--primary);
}

.stat-label {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 4px;
}

/* =============================================
   10. Stats View
   ============================================= */
.stats-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 16px;
}

.stats-summary {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}

.category-stat {
  background-color: var(--card);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
}

.category-stat-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.category-stat-name {
  font-size: 15px;
  font-weight: 600;
}

.category-stat-count {
  font-size: 13px;
  color: var(--text-secondary);
}

.category-stat .progress-bar {
  margin-bottom: 0;
}

/* =============================================
   11. Wrong Answers View
   ============================================= */
.wrong-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.wrong-header h2 {
  font-size: 20px;
  font-weight: 700;
}

#wrong-count {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 12px;
}

#wrong-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.wrong-item {
  background-color: var(--card);
  border: 1px solid var(--border);
  padding: 14px;
  border-radius: 12px;
  position: relative;
}

.wrong-item-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 6px;
}

.wrong-item-question {
  font-size: 14px;
  font-weight: 500;
  line-height: 1.5;
  margin-bottom: 8px;
  padding-right: 24px;
}

.wrong-item-remove {
  position: absolute;
  top: 14px;
  right: 14px;
  color: var(--wrong);
  cursor: pointer;
  font-size: 16px;
  font-weight: 700;
  line-height: 1;
  padding: 2px 6px;
  border: none;
  background: none;
}

.wrong-item-answers {
  font-size: 13px;
  line-height: 1.6;
}

.wrong-item-answers .your {
  color: var(--wrong);
  font-weight: 500;
}

.wrong-item-answers .correct {
  color: var(--correct);
  font-weight: 500;
}

/* =============================================
   12. Category Filter Modal
   ============================================= */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.4);
  z-index: 100;
  justify-content: center;
  align-items: center;
}

.modal-overlay.show {
  display: flex;
}

.modal {
  background-color: var(--card);
  border-radius: 16px;
  padding: 24px;
  max-width: 380px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
}

.modal-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 16px;
  text-align: center;
}

.modal-option {
  padding: 14px;
  border: 2px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  text-align: center;
  font-size: 15px;
  margin-bottom: 8px;
  transition: background-color 0.2s ease, border-color 0.2s ease;
}

.modal-option:last-child {
  margin-bottom: 0;
}

.modal-option.selected {
  border-color: var(--primary);
  background-color: var(--primary-light);
  color: var(--primary);
  font-weight: 600;
}

.modal-close {
  display: block;
  width: 100%;
  margin-top: 16px;
  padding: 12px;
  font-size: 15px;
  background-color: var(--bg);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  color: var(--text-secondary);
}

/* =============================================
   Quick-start cards (home view)
   ============================================= */
.quick-card {
  background-color: var(--card);
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  text-align: center;
  transition: transform 0.1s ease, box-shadow 0.2s ease;
}

.quick-card:active {
  transform: scale(0.97);
}

.quick-card:hover {
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
}

.quick-card-icon {
  font-size: 28px;
  margin-bottom: 6px;
}

.quick-card-label {
  font-size: 14px;
  font-weight: 600;
}

.quick-card-sub {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 2px;
}
</style>
</head>
<body>
<div id="app">
  <!-- =========================================
       Home View
       ========================================= -->
  <div id="view-home" class="view active">
    <div class="home-title">具身智能刷题</div>
    <div class="home-subtitle">具深学习，智能备考</div>

    <div class="progress-card">
      <div class="progress-card-header">
        <span class="progress-card-label">刷题进度</span>
        <span class="progress-card-pct" id="home-pct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="home-progress-bar" style="width: 0%;"></div>
      </div>
      <span style="font-size:12px;color:var(--text-secondary);" id="home-progress-detail"></span>
    </div>

    <div class="home-grid">
      <div class="quick-card">
        <div class="quick-card-icon">📝</div>
        <div class="quick-card-label">开始刷题</div>
        <div class="quick-card-sub">练习模式</div>
      </div>
      <div class="quick-card">
        <div class="quick-card-icon">🎯</div>
        <div class="quick-card-label">考试模式</div>
        <div class="quick-card-sub">模拟测验</div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <span class="stat-value" id="home-total">0</span>
        <span class="stat-label">总题数</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="home-correct">0</span>
        <span class="stat-label">正确率</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="home-wrong">0</span>
        <span class="stat-label">错题数</span>
      </div>
    </div>

    <div style="margin-top: 16px;">
      <button class="btn-outline-primary" style="width:100%;" id="home-select-category">选择题库分类</button>
    </div>
  </div>

  <!-- =========================================
       Quiz View
       ========================================= -->
  <div id="view-quiz" class="view">
    <div class="quiz-header">
      <span id="quiz-category">Python基础</span>
      <span id="quiz-progress-text"></span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="quiz-progress-bar"></div>
    </div>
    <div id="quiz-question"></div>
    <div id="quiz-options"></div>
    <div id="quiz-result"></div>
    <button id="quiz-next-btn" class="btn-primary" style="display:none;">下一题 →</button>
  </div>

  <!-- =========================================
       Stats View
       ========================================= -->
  <div id="view-stats" class="view">
    <div class="stats-title">刷题统计</div>
    <div class="stats-summary">
      <div class="stat-card">
        <span class="stat-value" id="stats-total">0</span>
        <span class="stat-label">总答题数</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="stats-correct">0</span>
        <span class="stat-label">正确数</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" id="stats-pct">0%</span>
        <span class="stat-label">正确率</span>
      </div>
    </div>
    <div id="stats-per-category">
      <p style="text-align:center;padding:20px;color:var(--text-secondary);">统计加载中...</p>
    </div>
    <button id="clear-progress-btn" class="btn-outline-danger" style="width:100%;margin-top:16px;">清除所有进度</button>
  </div>

  <!-- =========================================
       Wrong Answers View
       ========================================= -->
  <div id="view-wrong" class="view">
    <div class="wrong-header">
      <h2>错题薄</h2>
      <button id="clear-all-btn" class="btn-outline-danger">清空全部</button>
    </div>
    <p id="wrong-count"></p>
    <div id="wrong-list"></div>
    <button id="redo-all-btn" class="btn-danger">重做全部错题</button>
  </div>

  <!-- =========================================
       Category Filter Modal
       ========================================= -->
  <div class="modal-overlay" id="category-modal">
    <div class="modal">
      <div class="modal-title">选择题库</div>
      <div id="modal-options"></div>
      <button class="modal-close" id="modal-close-btn">关闭</button>
    </div>
  </div>

  <!-- =========================================
       Bottom Navigation
       ========================================= -->
  <nav class="bottom-nav">
    <div class="nav-item active" data-view="home">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">首页</span>
    </div>
    <div class="nav-item" data-view="quiz">
      <span class="nav-icon">📝</span>
      <span class="nav-label">刷题</span>
    </div>
    <div class="nav-item" data-view="stats">
      <span class="nav-icon">📊</span>
      <span class="nav-label">统计</span>
    </div>
    <div class="nav-item" data-view="wrong">
      <span class="nav-icon">📋</span>
      <span class="nav-label">错题</span>
    </div>
  </nav>
</div>

<script>
// ============================================================
// TASK 3: 核心刷题引擎

// 嵌入式题目数据 (来自 questions_structured.json)
