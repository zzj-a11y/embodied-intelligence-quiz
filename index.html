<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>具身智能 · 天玑识骨</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    min-height:100dvh;display:flex;align-items:center;justify-content:center
  }
  .container{text-align:center;padding:24px;max-width:480px}
  .brand-icon{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#00ff88,#006644);
    display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:#fff;margin:0 auto 16px}
  h1{font-size:24px;font-weight:700;margin-bottom:6px;letter-spacing:-0.02em}
  .sub{font-size:13px;color:#8b949e;margin-bottom:32px}
  .cards{display:flex;flex-direction:column;gap:12px}
  .card{display:block;background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px;
    text-decoration:none;color:#e6edf3;transition:all .2s;text-align:left}
  .card:hover{border-color:#00ff88;transform:translateY(-2px)}
  .card-title{font-size:18px;font-weight:600;margin-bottom:4px}
  .card-desc{font-size:13px;color:#8b949e}
  .card-tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;
    font-family:'JetBrains Mono','Cascadia Code','Consolas',monospace;margin-top:8px}
  .tag-quiz{background:rgba(88,166,255,.15);color:#58a6ff}
  .tag-review{background:rgba(0,255,136,.12);color:#00ff88}
  .gold-line{height:2px;background:linear-gradient(90deg,transparent,#00ff88,transparent);
    border-radius:1px;margin:24px 0}
  footer{font-size:11px;color:#6e7681;margin-top:24px}
  .gold-text{background:linear-gradient(90deg,#00cc66,#00ff88,#00cc66);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:600}
</style>
</head>
<body>
<div class="container">
  <div class="brand-icon">玑</div>
  <h1>具身智能 · 备赛工具</h1>
  <p class="sub">多传感器融合应用赛 · 天玑识骨</p>
  <div class="cards">
    <a href="quiz-app.html" class="card">
      <div class="card-title">初赛刷题</div>
      <div class="card-desc">400道选择题 · 4大模块 · 模拟考试 · 错题回顾</div>
      <span class="card-tag tag-quiz">quiz-app</span>
    </a>
    <a href="review-app.html" class="card">
      <div class="card-title">复赛备考</div>
      <div class="card-desc">19个TODO填空 · 闪卡记忆 · 答案对照 · 模块筛选</div>
      <span class="card-tag tag-review">review-app</span>
    </a>
  </div>
  <div class="gold-line"></div>
  <footer><span class="gold-text">天玑识骨</span> · 广州市风扬信息科技有限公司</footer>
</div>
</body>
</html>
