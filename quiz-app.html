// ============================================================
// 状态管理 (localStorage)
// ============================================================
const STATE_KEY = 'quiz_progress';

function loadState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return {
    answered: {},
    wrongIds: [],
    daily: {},
    streak: 0,
    lastQuizDate: ''
  };
}

function saveState(s) {
  try {
    localStorage.setItem(STATE_KEY, JSON.stringify(s));
  } catch(e) {
    // QuotaExceeded or private browsing — silently continue with in-memory state
    console.warn('Failed to save progress:', e.message);
  }
}

let state = loadState();
let currentQuestion = null;
let currentFilters = [];  // empty = all categories selected
let answeredInSession = false;
let redoingWrong = false;
let examMode = false;
let examQuestions = [];
let examIndex = 0;

const CATEGORIES = ['全部', 'Python基础', '机器学习', '深度学习', '计算机视觉'];

// ============================================================
// 智能选题算法
// ============================================================
function pickNextQuestion() {
  // 考试模式: 按顺序出题
  if (examMode) {
    if (examIndex >= examQuestions.length) return null;
    return examQuestions[examIndex];
  }

  // 重做错题模式: 只从错题中选
  if (redoingWrong) {
    if (state.wrongIds.length === 0) {
      return null; // 所有错题已完成 (caller resets flag)
    }
    const pool = ALL_QUESTIONS.filter(q => state.wrongIds.includes(q.id));
    if (pool.length === 0) return null;
    const idx = Math.floor(Math.random() * pool.length);
    let selected = pool[idx];
    if (selected.id === (currentQuestion && currentQuestion.id) && pool.length > 1) {
      const others = pool.filter(q => q.id !== selected.id);
      selected = others[Math.floor(Math.random() * others.length)];
    }
    return selected;
  }

  const hasFilter = currentFilters.length > 0;
  const pool = hasFilter
    ? ALL_QUESTIONS.filter(q => currentFilters.includes(q.category))
    : ALL_QUESTIONS;

  if (pool.length === 0) {
    return ALL_QUESTIONS[Math.floor(Math.random() * ALL_QUESTIONS.length)];
  }

  let selected = null;

  // 1. 优先未做过的题
  const unanswered = pool.filter(q => !(q.id in state.answered));
  if (unanswered.length > 0) {
    const idx = Math.floor(Math.random() * unanswered.length);
    selected = unanswered[idx];
  } else {
    // 2. 混合: 70% 错题, 30% 做对的题
    const wrongInPool = pool.filter(q => state.wrongIds.includes(q.id));
    const correctInPool = pool.filter(q =>
      state.answered[q.id] === 'correct' && !state.wrongIds.includes(q.id)
    );

    if (wrongInPool.length > 0 && Math.random() < 0.7) {
      const idx = Math.floor(Math.random() * wrongInPool.length);
      selected = wrongInPool[idx];
    } else if (correctInPool.length > 0) {
      const idx = Math.floor(Math.random() * correctInPool.length);
      selected = correctInPool[idx];
    } else {
      const idx = Math.floor(Math.random() * pool.length);
      selected = pool[idx];
    }
  }

  // 连续去重
  for (let attempt = 0; attempt < 5 && selected && currentQuestion && selected.id === currentQuestion.id && pool.length > 1; attempt++) {
    const others = pool.filter(q => q.id !== selected.id);
    if (others.length > 0) {
      selected = others[Math.floor(Math.random() * others.length)];
    }
  }

  return selected;
}

// ============================================================
// 渲染题目
// ============================================================
function renderQuestion(q) {
  currentQuestion = q;
  answeredInSession = false;

  // 分类标签
  const catLabel = examMode ? '考试模式'
    : redoingWrong ? '错题重做'
    : (currentFilters.length > 0 ? currentFilters.join('+') : q.category);
  document.getElementById('quiz-category').textContent = catLabel;

  // 进度文本和进度条
  const hasFilter = currentFilters.length > 0;
  let totalInFilter, idx;
  if (examMode) {
    totalInFilter = examQuestions.length;
    idx = examIndex + 1;
  } else if (hasFilter) {
    const filteredPool = ALL_QUESTIONS.filter(x => currentFilters.includes(x.category));
    totalInFilter = filteredPool.length;
    idx = filteredPool.findIndex(x => x.id === q.id) + 1;
  } else {
    totalInFilter = ALL_QUESTIONS.length;
    idx = ALL_QUESTIONS.findIndex(x => x.id === q.id) + 1;
  }
  document.getElementById('quiz-progress-text').textContent = idx + '/' + totalInFilter;
  document.getElementById('quiz-progress-bar').style.width = ((idx / totalInFilter) * 100) + '%';

  document.getElementById('quiz-question').textContent = q.question;

  // 渲染选项按钮
  const optsDiv = document.getElementById('quiz-options');
  optsDiv.innerHTML = '';
  ['A', 'B', 'C', 'D'].forEach(letter => {
    const btn = document.createElement('div');
    btn.className = 'quiz-option';
    btn.textContent = letter + '. ' + q.options[letter];
    btn.addEventListener('click', () => onAnswer(letter));
    optsDiv.appendChild(btn);
  });

  // 重置结果区域
  const resultDiv = document.getElementById('quiz-result');
  resultDiv.className = '';
  resultDiv.style.display = 'none';
  resultDiv.innerHTML = '';

  const nextBtn = document.getElementById('quiz-next-btn');
  nextBtn.style.display = 'none';
}

// ============================================================
// 答题处理
// ============================================================
function onAnswer(letter) {
  if (answeredInSession) return;
  answeredInSession = true;

  const q = currentQuestion;
  const isCorrect = letter === q.answer;

  // 高亮选项
  const btns = document.querySelectorAll('#quiz-options .quiz-option');
  btns.forEach(btn => {
    btn.classList.add('disabled');
    const btnLetter = btn.textContent.trim().charAt(0);
    if (btnLetter === q.answer) {
      btn.classList.add('correct');
    } else if (btnLetter === letter && !isCorrect) {
      btn.classList.add('wrong');
    } else {
      btn.classList.add('dimmed');
    }
  });

  // 考试模式: 只记录答案，不显示解析
  if (examMode) {
    const resultDiv = document.getElementById('quiz-result');
    resultDiv.style.display = 'block';
    resultDiv.className = 'show';  // neutral, no correct/wrong coloring
    resultDiv.innerHTML = '<b>已记录答案</b>';
    state.answered[q.id] = isCorrect ? 'correct' : 'wrong';
    if (!isCorrect && !state.wrongIds.includes(q.id)) {
      state.wrongIds.push(q.id);
    }
    // 更新每日统计
    const today = new Date().toISOString().slice(0, 10);
    state.daily[today] = (state.daily[today] || 0) + 1;
    state.lastQuizDate = today;
    saveState(state);
    document.getElementById('quiz-next-btn').style.display = 'block';
    document.getElementById('quiz-next-btn').textContent = examIndex >= examQuestions.length - 1 ? '查看成绩 →' : '下一题 →';
    updateHomeStats();
    return;
  }

  // 练习模式: 显示解析
  const resultDiv = document.getElementById('quiz-result');
  resultDiv.style.display = 'block';
  if (isCorrect) {
    resultDiv.className = 'show correct-result';
    resultDiv.innerHTML = '<b>✓ 回答正确！</b><br><span style="color:#666;">' + q.explanation + '</span>';
    state.answered[q.id] = 'correct';
    // 重做模式: 答对则从错题中移除
    if (redoingWrong) {
      state.wrongIds = state.wrongIds.filter(id => id !== q.id);
    }
  } else {
    resultDiv.className = 'show wrong-result';
    resultDiv.innerHTML = '<b>✗ 回答错误</b><br><span style="color:#666;">' + q.explanation + '</span><br><span style="color:var(--wrong);">已加入错题薄</span>';
    state.answered[q.id] = 'wrong';
    if (!state.wrongIds.includes(q.id)) {
      state.wrongIds.push(q.id);
    }
  }

  // 更新每日统计
  const today = new Date().toISOString().slice(0, 10);
  state.daily[today] = (state.daily[today] || 0) + 1;
  state.lastQuizDate = today;

  saveState(state);
  document.getElementById('quiz-next-btn').style.display = 'block';

  // 更新首页数据
  updateHomeStats();
}

function nextQuestion() {
  const q = pickNextQuestion();

  if (q) {
    if (examMode) {
      examIndex++;
      document.getElementById('quiz-progress-text').textContent = (examIndex + 1) + '/' + examQuestions.length;
      document.getElementById('quiz-progress-bar').style.width = ((examIndex + 1) / examQuestions.length * 100) + '%';
    }
    renderQuestion(q);
    return;
  }

  // No more questions — check what mode we're in
  if (examMode) {
    // Exam finished — show score
    finishExam();
    return;
  }

  if (redoingWrong) {
    redoingWrong = false;
    alert('全部错题已完成! 继续加油!');
    switchView('wrong');
    return;
  }

  // Fallback (shouldn't normally reach here)
  renderQuestion(ALL_QUESTIONS[Math.floor(Math.random() * ALL_QUESTIONS.length)]);
}

// ============================================================
// 考试模式 — 结束考试，显示成绩
// ============================================================
function finishExam() {
  examMode = false;
  const total = examQuestions.length;
  const correctCount = examQuestions.filter(q => state.answered[q.id] === 'correct').length;
  const wrongQuestions = examQuestions.filter(q => state.answered[q.id] === 'wrong');
  const score = correctCount; // 每题1分，满分=total

  document.getElementById('quiz-category').textContent = '考试结束';
  document.getElementById('quiz-progress-text').textContent = total + '/' + total;
  document.getElementById('quiz-progress-bar').style.width = '100%';
  document.getElementById('quiz-question').textContent = '考试完成！';
  document.getElementById('quiz-options').innerHTML = '';
  document.getElementById('quiz-next-btn').style.display = 'none';

  const resultDiv = document.getElementById('quiz-result');
  resultDiv.style.display = 'block';
  resultDiv.className = 'exam-result';

  let wrongHTML = '';
  if (wrongQuestions.length > 0) {
    wrongHTML = `
      <div style="text-align:left;margin-top:16px;">
        <h3 style="font-size:16px;margin-bottom:8px;">错题解析 (${wrongQuestions.length}题)</h3>
        ${wrongQuestions.map(q => `
          <div style="background:#fff;border:1px solid #eee;border-radius:12px;padding:12px;margin-bottom:8px;text-align:left;">
            <p style="font-size:13px;color:var(--text-secondary);margin:0 0 4px 0;">${q.category} · 第${q.id}题</p>
            <p style="font-size:14px;margin:0 0 8px 0;">${q.question}</p>
            <p style="font-size:12px;margin:0;color:var(--wrong);">你的答案：${q.options[Object.keys(state.answered).find(k => state.answered[parseInt(k)] === 'wrong' && parseInt(k) === q.id) ? '' : ''] || '未知'}</p>
            <p style="font-size:12px;margin:2px 0;color:var(--correct);">正确答案：${q.answer}. ${q.options[q.answer]}</p>
            <p style="font-size:12px;margin:4px 0 0 0;color:var(--text-secondary);">${q.explanation}</p>
          </div>
        `).join('')}
      </div>
    `;
  }

  resultDiv.innerHTML = `
    <div style="text-align:center;">
      <div style="font-size:64px;margin:8px 0;">${score >= 80 ? '🏆' : score >= 60 ? '🎉' : '💪'}</div>
      <p style="font-size:32px;font-weight:700;color:var(--primary);margin:0;">${score}/${total} 分</p>
      <p style="color:var(--text-secondary);margin:4px 0 0 0;">答对 ${correctCount} 题 · 正确率 ${Math.round((correctCount / total) * 100)}%</p>
      <button class="btn-primary" onclick="switchView('home');updateHomeStats();" style="margin-top:16px;">返回首页</button>
      ${wrongQuestions.length > 0 ? '<button class="btn-outline-primary" onclick="switchView(\'wrong\');" style="margin-top:8px;width:100%;">查看错题薄</button>' : ''}
      ${wrongHTML}
    </div>
  `;

  examQuestions = [];
  examIndex = 0;
  currentQuestion = null;
  saveState(state);
}

// ============================================================
// 首页统计更新
// ============================================================
function updateHomeStats() {
  const totalDone = Object.keys(state.answered).length;
  const correctCount = Object.values(state.answered).filter(v => v === 'correct').length;
  const wrongCount = state.wrongIds.length;
  const accuracy = totalDone > 0 ? Math.round((correctCount / totalDone) * 100) : 0;
  const progress = Math.round((totalDone / ALL_QUESTIONS.length) * 100);

  document.getElementById('home-pct').textContent = progress + '%';
  document.getElementById('home-progress-bar').style.width = progress + '%';
  document.getElementById('home-progress-detail').textContent = '已完成 ' + totalDone + '/' + ALL_QUESTIONS.length + ' 题';
  document.getElementById('home-correct').textContent = accuracy + '%';
  document.getElementById('home-wrong').textContent = wrongCount;
  document.getElementById('home-total').textContent = totalDone;
}

// ============================================================
// 分类筛选弹窗
// ============================================================
function openCategoryModal() {
  const modalOptions = document.getElementById('modal-options');
  modalOptions.innerHTML = '';

  // "全选" quick toggle
  const allBtn = document.createElement('div');
  allBtn.className = 'modal-option' + (currentFilters.length === 0 ? ' selected' : '');
  allBtn.textContent = '全部';
  allBtn.style.fontWeight = '600';
  allBtn.addEventListener('click', () => {
    redoingWrong = false; examMode = false;
    currentFilters = [];
    document.getElementById('category-modal').classList.remove('show');
    const q = pickNextQuestion();
    if (q) renderQuestion(q);
  });
  modalOptions.appendChild(allBtn);

  CATEGORIES.filter(c => c !== '全部').forEach(cat => {
    const isSelected = currentFilters.includes(cat);
    const div = document.createElement('div');
    div.className = 'modal-option' + (isSelected ? ' selected' : '');
    div.textContent = (isSelected ? '☑ ' : '☐ ') + cat;
    div.addEventListener('click', () => {
      redoingWrong = false; examMode = false;
      // Toggle this category
      if (currentFilters.includes(cat)) {
        currentFilters = currentFilters.filter(f => f !== cat);
      } else {
        currentFilters = [...currentFilters, cat];
      }
      // Refresh modal display
      refreshCategoryModal();
    });
    modalOptions.appendChild(div);
  });

  // Confirm button
  const confirmBtn = document.createElement('button');
  confirmBtn.className = 'btn-primary';
  confirmBtn.textContent = '确认选择';
  confirmBtn.style.marginTop = '12px';
  confirmBtn.addEventListener('click', () => {
    document.getElementById('category-modal').classList.remove('show');
    if (currentFilters.length === CATEGORIES.length - 1) currentFilters = []; // all selected = 全部
    const q = pickNextQuestion();
    if (q) renderQuestion(q);
  });
  modalOptions.appendChild(confirmBtn);

  document.getElementById('category-modal').classList.add('show');
}

function refreshCategoryModal() {
  const modalOptions = document.getElementById('modal-options');
  const btns = modalOptions.querySelectorAll('.modal-option:not(:first-child)');
  let idx = 0;
  CATEGORIES.filter(c => c !== '全部').forEach(cat => {
    if (idx < btns.length && !btns[idx].classList.contains('btn-primary')) {
      const isSelected = currentFilters.includes(cat);
      btns[idx].className = 'modal-option' + (isSelected ? ' selected' : '');
      btns[idx].textContent = (isSelected ? '☑ ' : '☐ ') + cat;
      idx++;
    }
  });
  // Update 全部 state
  const allBtn = modalOptions.querySelector('.modal-option');
  if (allBtn) {
    allBtn.className = 'modal-option' + (currentFilters.length === 0 ? ' selected' : '');
  }
}

// ============================================================
// 统计视图渲染
// ============================================================
function updateStatsView() {
  const totalDone = Object.keys(state.answered).length;
  const correctCount = Object.values(state.answered).filter(v => v === 'correct').length;
  const pct = totalDone > 0 ? Math.round((correctCount / totalDone) * 100) : 0;

  document.getElementById('stats-total').textContent = totalDone;
  document.getElementById('stats-correct').textContent = correctCount;
  document.getElementById('stats-pct').textContent = pct + '%';

  // 每分类统计
  const perCatDiv = document.getElementById('stats-per-category');
  perCatDiv.innerHTML = '';
  const cats = ['Python基础', '机器学习', '深度学习', '计算机视觉'];
  cats.forEach(cat => {
    const catQuestions = ALL_QUESTIONS.filter(q => q.category === cat);
    const catTotal = catQuestions.length;
    const catDone = catQuestions.filter(q => q.id in state.answered).length;
    const catCorrect = catQuestions.filter(q => state.answered[q.id] === 'correct').length;
    const catPct = catDone > 0 ? Math.round((catCorrect / catDone) * 100) : 0;
    const catProgress = catTotal > 0 ? Math.round((catDone / catTotal) * 100) : 0;

    const div = document.createElement('div');
    div.className = 'category-stat';
    div.innerHTML =
      '<div class="category-stat-header">' +
        '<span class="category-stat-name">' + cat + '</span>' +
        '<span class="category-stat-count">' + catDone + '/' + catTotal + ' (' + catPct + '%)</span>' +
      '</div>' +
      '<div class="progress-bar">' +
        '<div class="progress-fill" style="width:' + catProgress + '%;"></div>' +
      '</div>';
    perCatDiv.appendChild(div);
  });
}

// ============================================================
// 错题视图渲染
// ============================================================
function updateWrongView() {
  const wrongList = document.getElementById('wrong-list');
  const wrongCountEl = document.getElementById('wrong-count');
  wrongList.innerHTML = '';

  if (state.wrongIds.length === 0) {
    wrongCountEl.textContent = '还没有错题，继续加油！';
    document.getElementById('redo-all-btn').style.display = 'none';
    return;
  }

  wrongCountEl.textContent = '共 ' + state.wrongIds.length + ' 道错题';
  document.getElementById('redo-all-btn').style.display = 'block';

  state.wrongIds.forEach(wid => {
    const q = ALL_QUESTIONS.find(q => q.id === wid);
    if (!q) return;

    const correctAnswerText = q.options[q.answer];

    const item = document.createElement('div');
    item.className = 'wrong-item';
    item.innerHTML =
      '<div class="wrong-item-header">' +
        '<span style="font-size:12px;color:var(--text-secondary);">' + q.category + '</span>' +
      '</div>' +
      '<div class="wrong-item-question">' + q.question + '</div>' +
      '<div class="wrong-item-answers">' +
        '<span class="correct">答案：' + q.answer + '. ' + correctAnswerText + '</span>' +
      '</div>' +
      '<button class="wrong-item-remove" data-id="' + wid + '">✕</button>';

    wrongList.appendChild(item);
  });

  // 删除单条错题
  document.querySelectorAll('.wrong-item-remove').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const wid = parseInt(btn.dataset.id);
      state.wrongIds = state.wrongIds.filter(id => id !== wid);
      saveState(state);
      updateWrongView();
      updateHomeStats();
    });
  });
}

// ============================================================
// 视图切换
// ============================================================
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    const viewName = item.dataset.view;
    switchView(viewName);
  });
});

function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const view = document.getElementById('view-' + name);
  if (view) view.classList.add('active');
  const navItem = document.querySelector('.nav-item[data-view="' + name + '"]');
  if (navItem) navItem.classList.add('active');

  // 切换到刷题视图时，自动初始化题目
  if (name === 'quiz' && !currentQuestion) {
    const q = pickNextQuestion();
    if (q) renderQuestion(q);
  }

  // 切换到首页时更新统计
  if (name === 'home') {
    updateHomeStats();
  }

  // 切换到统计视图时更新统计详情
  if (name === 'stats') {
    updateStatsView();
  }

  // 切换到错题视图时更新错题列表
  if (name === 'wrong') {
    updateWrongView();
  }
}

// ============================================================
// 事件绑定
// ============================================================

// 分类标签点击 → 打开分类弹窗
document.getElementById('quiz-category').addEventListener('click', () => {
  openCategoryModal();
});

// 下一题按钮
document.getElementById('quiz-next-btn').addEventListener('click', () => {
  nextQuestion();
});

// 首页"开始刷题"卡片
const startCards = document.querySelectorAll('.quick-card');
if (startCards.length >= 1) {
  startCards[0].addEventListener('click', () => {
    redoingWrong = false;
    examMode = false;
    switchView('quiz');
    currentQuestion = null;
    const q = pickNextQuestion();
    if (q) renderQuestion(q);
  });
}

// 首页"考试模式"卡片
if (startCards.length >= 2) {
  startCards[1].addEventListener('click', () => {
    redoingWrong = false;
    examMode = true;
    // Randomly pick 100 questions from the active filter
    const hasFilter = currentFilters.length > 0;
    const pool = hasFilter
      ? ALL_QUESTIONS.filter(q => currentFilters.includes(q.category))
      : ALL_QUESTIONS;
    // Shuffle and pick 100
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    examQuestions = shuffled.slice(0, Math.min(100, shuffled.length));
    examIndex = 0;
    currentQuestion = null;
    switchView('quiz');
    const q = pickNextQuestion();
    if (q) renderQuestion(q);
  });
}

// 首页"选择题库分类"按钮
document.getElementById('home-select-category').addEventListener('click', () => {
  openCategoryModal();
});

// 清除所有进度
document.getElementById('clear-progress-btn').addEventListener('click', () => {
  if (confirm('确定要清除所有刷题进度？\n包括已答题记录、错题薄、每日统计。此操作不可恢复。')) {
    state.answered = {};
    state.wrongIds = [];
    state.daily = {};
    state.streak = 0;
    state.lastQuizDate = '';
    saveState(state);
    currentQuestion = null;
    updateHomeStats();
    updateStatsView();
    updateWrongView();
  }
});

// 清空错题
document.getElementById('clear-all-btn').addEventListener('click', () => {
  if (confirm('确定要清空所有错题吗？此操作不可恢复。')) {
    state.wrongIds = [];
    saveState(state);
    updateWrongView();
    updateHomeStats();
  }
});

// 重做全部错题
document.getElementById('redo-all-btn').addEventListener('click', () => {
  if (state.wrongIds.length === 0) return;
  redoingWrong = true;
  currentFilters = [];
  const q = pickNextQuestion();
  if (q) {
    renderQuestion(q);
    switchView('quiz');
  } else {
    redoingWrong = false;
    alert('没有错题可做!');
  }
});

// 弹窗关闭
document.getElementById('modal-close-btn').addEventListener('click', () => {
  document.getElementById('category-modal').classList.remove('show');
});

document.getElementById('category-modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) {
    e.currentTarget.classList.remove('show');
  }
});

// ============================================================
// 初始化
// ============================================================
updateHomeStats();
</script>
</body>
</html>
