<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<title>复赛备考 · 天玑识骨</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --accent-code:#00ff88;--accent-btn:#006644;--accent-btn-hover:#007f55;
  --danger:#f85149;--danger-bg:#490202;--success:#238636;--success-bg:#04260f;
  --module-A:#58a6ff;--module-B:#f0883e;--module-C:#d2a800;--module-D:#a371f7;
  --radius:8px;
  --font-mono:'JetBrains Mono','Cascadia Code','Fira Code','Consolas',monospace;
  --font-ui:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
html{background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:16px;line-height:1.6;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
body{max-width:800px;margin:0 auto;padding:16px;padding-top:max(16px,env(safe-area-inset-top));padding-bottom:max(16px,env(safe-area-inset-bottom));padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right));min-height:100dvh;display:flex;flex-direction:column;overscroll-behavior:none}

.skeleton{animation:shimmer 1.5s infinite;background:linear-gradient(90deg,var(--surface)25%,var(--surface2)50%,var(--surface)75%);background-size:200% 100%;min-height:200px;border-radius:var(--radius)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton.hidden{display:none}

header{padding:12px 0;border-bottom:1px solid var(--border);margin-bottom:12px}
.header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:32px;height:32px;border-radius:6px;background:linear-gradient(135deg,#00ff88,#006644);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff}
.brand-text{font-size:18px;font-weight:700;letter-spacing:-0.02em}
.brand-sub{font-size:11px;color:var(--text2);font-family:var(--font-mono)}
.home-link{display:flex;align-items:center;gap:4px;color:var(--text3);text-decoration:none;font-family:var(--font-mono);font-size:11px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);transition:all .15s;margin-left:auto;align-self:flex-start}
.home-link:hover{color:var(--accent-code);border-color:var(--accent-code)}
.gold-line{height:2px;background:linear-gradient(90deg,transparent,#00ff88,transparent);margin-top:10px;border-radius:1px}

/* Section Nav */
.section-nav{display:flex;gap:0;margin-bottom:12px;background:var(--surface);border-radius:12px;padding:3px}
.section-nav-btn{flex:1;padding:10px 16px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font-mono);font-size:13px;font-weight:600;border-radius:10px;transition:all .2s;min-height:44px}
.section-nav-btn.active{background:var(--surface2);color:var(--accent-code);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.section-nav-btn:hover:not(.active){color:var(--text)}

/* Progress */
.progress-wrap{margin:8px 0 12px}
.progress-info{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:4px;font-family:var(--font-mono)}
.progress-track{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent-code);border-radius:2px;transition:width .4s ease}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.tab{padding:8px 14px;border:1px solid var(--border);border-radius:20px;background:var(--surface);color:var(--text2);cursor:pointer;font-size:12px;font-family:var(--font-mono);transition:all .2s;user-select:none}
.tab:hover{border-color:var(--text3);color:var(--text)}
.tab.active{background:var(--surface2);border-color:var(--accent-code);color:var(--accent-code)}
.tab .tab-count{font-size:10px;opacity:.6;margin-left:3px}

/* Toolbar */
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap;font-family:var(--font-mono);font-size:11px;color:var(--text2)}
.toolbar label{display:flex;align-items:center;gap:5px;cursor:pointer}
.toolbar input[type=checkbox]{accent-color:var(--accent-code)}

/* Mode switch */
.mode-switch{display:flex;gap:4px;margin-bottom:10px;background:var(--surface);border-radius:20px;padding:3px;width:fit-content}
.mode-btn{padding:6px 18px;border-radius:18px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-family:var(--font-mono);transition:all .2s}
.mode-btn.active{background:var(--surface2);color:var(--accent-code);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.mode-btn:hover:not(.active){color:var(--text)}

/* Flashcard */
.card-scene{perspective:1000px;min-height:300px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.card{position:relative;width:100%;max-width:640px;min-height:280px;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.16,1,.3,1);cursor:pointer;touch-action:manipulation;user-select:none;-webkit-user-select:none}
.card.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);padding:24px;display:flex;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch}
.card-back{transform:rotateY(180deg);background:var(--surface);border-color:var(--accent-code)}

.card-module-tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-family:var(--font-mono);font-weight:600;margin-bottom:10px;width:fit-content}
.card-module-tag.A{background:rgba(88,166,255,.15);color:var(--module-A)}
.card-module-tag.B{background:rgba(240,136,62,.15);color:var(--module-B)}
.card-module-tag.C{background:rgba(210,168,0,.15);color:var(--module-C)}
.card-module-tag.D{background:rgba(163,113,247,.15);color:var(--module-D)}
.card-id{font-family:var(--font-mono);font-size:14px;color:var(--accent-code);margin-bottom:6px}
.card-title{font-size:20px;font-weight:700;margin-bottom:10px;letter-spacing:-0.01em}
.card-desc{font-size:14px;color:var(--text2);margin-bottom:12px;line-height:1.6}
.card-hint{font-size:12px;color:var(--text3);margin-top:auto;text-align:center;font-family:var(--font-mono);animation:pulse 2s infinite}
.card-hint.flipped-hidden{display:none}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

.answer-label{font-size:11px;color:var(--accent-code);font-family:var(--font-mono);margin-bottom:6px;text-transform:uppercase;letter-spacing:.1em}
.answer-code{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:14px;font-family:var(--font-mono);font-size:14px;color:var(--accent-code);overflow-x:auto;white-space:pre-wrap;word-break:break-all;line-height:1.7;margin-bottom:12px}
.answer-code .kw{color:#ff7b72}
.answer-code .str{color:#a5d6ff}
.answer-code .cmt{color:#6e7681;font-style:italic}
.answer-explain{font-size:12px;color:var(--text2);line-height:1.7;border-left:2px solid var(--border);padding-left:12px;margin-bottom:8px}

/* Collapsible */
.collapse-section{margin-top:10px;border-top:1px solid var(--border);padding-top:8px}
.collapse-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:8px 0;font-family:var(--font-mono);font-size:12px;color:var(--text2);user-select:none;min-height:44px}
.collapse-header:hover{color:var(--text)}
.collapse-header .collapse-arrow{transition:transform .2s;font-size:10px}
.collapse-header.open .collapse-arrow{transform:rotate(90deg)}
.collapse-body{display:none;font-size:12px;color:var(--text2);line-height:1.7;padding:4px 0 8px}
.collapse-body.open{display:block}
.reasoning-step{margin-bottom:5px;padding-left:4px}
.pipeline-diagram{font-family:var(--font-mono);font-size:10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;white-space:pre;overflow-x:auto;line-height:1.4;color:var(--text3)}

/* Buttons */
.card-actions{display:flex;gap:8px;justify-content:center;margin-top:6px}
.btn{padding:10px 24px;border-radius:var(--radius);border:none;cursor:pointer;font-family:var(--font-mono);font-size:13px;font-weight:600;transition:all .15s;user-select:none}
.btn:active{transform:scale(.98)}
.btn-wrong{background:var(--danger-bg);color:var(--danger);border:1px solid rgba(248,81,73,.3)}
.btn-wrong:hover{background:rgba(248,81,73,.2)}
.btn-right{background:var(--accent-btn);color:#fff;border:1px solid rgba(0,255,136,.2)}
.btn-right:hover{background:var(--accent-btn-hover)}
.btn-nav{padding:8px 16px;background:var(--surface);color:var(--text2);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-family:var(--font-mono);font-size:12px;transition:all .15s}
.btn-nav:hover{color:var(--text);border-color:var(--text3)}
.btn-nav:disabled{opacity:.3;cursor:not-allowed}
.btn-nav:active:not(:disabled){transform:scale(.98)}

.nav-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:6px}
.nav-pos{font-family:var(--font-mono);font-size:12px;color:var(--text3);min-width:60px;text-align:center}

/* Overview */
.overview-list{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.overview-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .15s}
.overview-item:hover{border-color:var(--text3)}
.overview-item.mastered{opacity:.4;border-color:transparent}
.overview-item .oi-header{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.overview-item .oi-id{font-family:var(--font-mono);font-size:10px;color:var(--accent-code)}
.overview-item .oi-score{font-family:var(--font-mono);font-size:10px;color:var(--text3);margin-left:auto}
.overview-item .oi-title{font-size:13px;font-weight:600;margin-bottom:3px}
.overview-item .oi-answer{font-family:var(--font-mono);font-size:11px;color:var(--text3);padding:4px 8px;background:var(--bg);border-radius:4px;margin-top:4px;filter:blur(8px);transition:filter .3s;min-height:44px;display:flex;align-items:center}
.overview-item .oi-answer.revealed{filter:none;color:var(--accent-code)}
.overview-item .oi-answer:hover{filter:none;color:var(--accent-code)}

/* Toast */
.toast{position:fixed;bottom:max(24px,calc(env(safe-area-inset-bottom) + 12px));left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 20px;font-family:var(--font-mono);font-size:12px;color:var(--text);z-index:20;opacity:0;pointer-events:none;transition:opacity .3s}
.toast.show{opacity:1}
.error-toast{position:fixed;top:max(16px,calc(env(safe-area-inset-top) + 8px));left:50%;transform:translateX(-50%);background:var(--danger-bg);border:1px solid rgba(248,81,73,.3);color:var(--danger);padding:8px 18px;border-radius:var(--radius);font-family:var(--font-mono);font-size:12px;z-index:20;opacity:0;transition:opacity .3s}
.error-toast.show{opacity:1}

.empty-state{text-align:center;padding:48px 24px;display:none}
.empty-state.visible{display:block}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px;opacity:.5}
.empty-state .empty-title{font-size:16px;font-weight:600;margin-bottom:8px}
.empty-state .empty-desc{font-size:13px;color:var(--text3)}

.stats-bar{display:flex;gap:12px;font-family:var(--font-mono);font-size:11px;color:var(--text3);margin-bottom:6px;flex-wrap:wrap}
.stats-bar .stat-val{color:var(--accent-code);font-weight:600}

/* ===== SECTION 2: PATTERNS ===== */
.section-title{font-size:18px;font-weight:700;margin-bottom:14px;letter-spacing:-0.01em}
.section-subtitle{font-size:15px;font-weight:600;margin:20px 0 10px;color:var(--text);border-bottom:1px solid var(--border);padding-bottom:6px}

.pattern-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.pattern-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:all .15s}
.pattern-card:hover{border-color:var(--accent-code)}
.pattern-card .pattern-icon{font-size:22px;margin-bottom:6px}
.pattern-card .pattern-name{font-size:14px;font-weight:700;margin-bottom:3px}
.pattern-card .pattern-syntax{font-family:var(--font-mono);font-size:12px;color:var(--accent-code);background:var(--bg);padding:6px 10px;border-radius:4px;margin:8px 0}
.pattern-card .pattern-count{font-size:10px;color:var(--text3)}
.pattern-card .pattern-tip{font-size:11px;color:var(--text3);margin-top:4px;line-height:1.5}

.flow-diagram{font-family:var(--font-mono);font-size:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;white-space:pre;overflow-x:auto;line-height:1.5;color:var(--text2);margin-bottom:16px}

.speed-trainer{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:center;margin-bottom:16px}
.speed-trainer .trainer-desc{font-size:12px;color:var(--text2);margin-bottom:8px}
.speed-trainer .trainer-code{font-family:var(--font-mono);font-size:12px;background:var(--bg);border-radius:6px;padding:14px;text-align:left;line-height:2;white-space:pre-wrap;margin:10px 0;color:var(--text2);cursor:pointer;user-select:none}
.speed-trainer .trainer-code .code-line{padding:4px 8px;border-radius:3px;transition:background .15s}
.speed-trainer .trainer-code .code-line:hover{background:rgba(255,255,255,.03)}
.speed-trainer .trainer-code .code-line.found{background:rgba(0,255,136,.12);color:var(--accent-code)}
.speed-trainer .trainer-code .code-line.wrong{background:rgba(248,81,73,.12)}
.speed-trainer .trainer-timer{font-family:var(--font-mono);font-size:28px;color:var(--accent-code);margin:8px 0}
.speed-trainer .trainer-result{font-size:12px;margin-top:6px;min-height:18px;font-family:var(--font-mono)}

.exception-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.exception-card{background:var(--surface);border:1px solid var(--danger);border-radius:var(--radius);padding:16px}
.exception-card .exception-label{font-size:10px;color:var(--danger);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.exception-card .exception-id{font-family:var(--font-mono);font-size:13px;color:var(--accent-code);margin-bottom:3px}
.exception-card .exception-title{font-size:14px;font-weight:600;margin-bottom:6px}
.exception-card .exception-answer{font-family:var(--font-mono);font-size:12px;color:var(--accent-code);background:var(--bg);padding:6px 10px;border-radius:4px;margin-bottom:6px}
.exception-card .exception-logic{font-size:11px;color:var(--text3);line-height:1.5}

/* Tip box */
.tip-box{background:rgba(0,255,136,.05);border:1px solid rgba(0,255,136,.15);border-radius:var(--radius);padding:14px;margin-bottom:16px}
.tip-box .tip-title{font-size:12px;color:var(--accent-code);font-family:var(--font-mono);margin-bottom:6px}
.tip-box .tip-body{font-size:12px;color:var(--text2);line-height:1.7}

footer{text-align:center;padding:20px 0 12px;font-size:11px;color:var(--text3);margin-top:auto;border-top:1px solid var(--border)}
footer .gold-text{background:linear-gradient(90deg,#00cc66,#00ff88,#00cc66);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:600}

/* Responsive */
@media(max-width:480px){
  body{padding:10px;padding-top:max(10px,env(safe-area-inset-top));padding-bottom:max(24px,env(safe-area-inset-bottom));padding-left:max(10px,env(safe-area-inset-left));padding-right:max(10px,env(safe-area-inset-right))}
  .section-nav-btn{font-size:12px;padding:8px 10px}
  .tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
  .tab{padding:9px 4px;font-size:10px;text-align:center;min-height:44px;display:flex;align-items:center;justify-content:center}
  .tab .tab-count{display:none}
  .mode-switch{width:100%}
  .mode-btn{flex:1;text-align:center;padding:10px 14px;font-size:13px;min-height:44px}
  .card-face{padding:16px}
  .card-title{font-size:17px}
  .card-desc{font-size:12px}
  .card-hint{font-size:10px}
  .answer-code{font-size:11px;padding:10px}
  .answer-explain{font-size:11px}
  .btn{padding:11px 22px;font-size:13px;min-height:44px;min-width:70px}
  .btn-nav{padding:10px 16px;font-size:12px;min-height:44px}
  .nav-row{gap:8px}
  .overview-list{grid-template-columns:1fr;gap:8px}
  .pattern-grid{grid-template-columns:1fr}
  .exception-cards{grid-template-columns:1fr}
  .flow-diagram{font-size:8px;padding:10px}
  .speed-trainer{padding:14px}
  .trainer-code{font-size:10px;padding:10px}
  .stats-bar{gap:6px;font-size:9px}
  .header-top{gap:6px}
  .brand-text{font-size:15px}
  .toolbar{font-size:10px;gap:4px}
}

@media(max-width:380px){
  .tabs{grid-template-columns:repeat(2,1fr)}
  .card-title{font-size:15px}
  .card-face{padding:12px}
  .answer-code{font-size:10px;padding:8px}
  .btn{padding:10px 16px;font-size:12px}
}

@media(prefers-reduced-motion:reduce){
  .card{transition:none}
  .card.flipped{transform:none}
  .card .card-front{display:none}
  .card .card-back{position:static;transform:none;backface-visibility:visible}
  .card.flipped .card-front{display:none}
  .card.flipped .card-back{display:flex}
  .card:not(.flipped) .card-back{display:none}
  .card:not(.flipped) .card-front{display:flex;position:static}
  .card-hint{animation:none}
  .skeleton{animation:none;background:var(--surface)}
  .progress-fill{transition:none}
}
</style>
</head>
<body>

<div class="skeleton" id="skeleton"></div>

<main id="main" style="display:none">

<header>
  <div class="header-top">
    <div class="brand">
      <div class="brand-icon">玑</div>
      <div>
        <div class="brand-text">复赛备考复习</div>
        <div class="brand-sub">embodied-ai review</div>
      </div>
    </div>
    <a href="index.html" class="home-link">← 主页</a>
    <div class="stats-bar" id="statsBar"></div>
  </div>
  <div class="gold-line"></div>
  <div class="progress-wrap">
    <div class="progress-info"><span id="progressLabel">已掌握 0 / 19</span><span id="progressPct">0%</span></div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
</header>

<!-- SECTION NAV -->
<div class="section-nav">
  <button class="section-nav-btn active" data-section="practice" id="navPractice">原题练习</button>
  <button class="section-nav-btn" data-section="patterns" id="navPatterns">模式速成</button>
</div>

<!-- ==================== SECTION 1: PRACTICE ==================== -->
<div id="sectionPractice">

<div class="mode-switch">
  <button class="mode-btn active" data-mode="flashcard" id="modeFlashcard">闪卡</button>
  <button class="mode-btn" data-mode="overview" id="modeOverview">一览</button>
</div>

<div class="toolbar">
  <label><input type="checkbox" id="shuffleToggle" onchange="toggleShuffle(this.checked)"> 随机打乱</label>
  <button class="btn-nav" id="speedReviewBtn" onclick="startSpeedReview()">3秒速览</button>
  <span id="speedReviewStatus" style="display:none;color:var(--accent-code)">进行中...</span>
</div>

<div class="tabs" id="tabs">
  <button class="tab active" data-module="all">全部<span class="tab-count">19</span></button>
  <button class="tab" data-module="A">A:大模型<span class="tab-count">4</span></button>
  <button class="tab" data-module="B">B:视觉<span class="tab-count">4</span></button>
  <button class="tab" data-module="C">C:可视化<span class="tab-count">6</span></button>
  <button class="tab" data-module="D">D:集成<span class="tab-count">5</span></button>
  <button class="tab" data-module="wrong">错题<span class="tab-count" id="wrongCount">0</span></button>
</div>

<div id="flashcardView">
  <div class="card-scene">
    <div class="card" id="card" onclick="flipCard()">
      <div class="card-face card-front">
        <span class="card-module-tag" id="cardModule">A</span>
        <div class="card-id" id="cardId">#A1</div>
        <div class="card-title" id="cardTitle"></div>
        <div class="card-desc" id="cardDesc"></div>
        <div class="card-hint" id="cardHint">点击翻转查看答案</div>
      </div>
      <div class="card-face card-back" id="cardBack"></div>
    </div>
  </div>
  <div class="card-actions">
    <button class="btn btn-wrong" onclick="markWrong()">不会</button>

// ===== APP STATE =====
const STORAGE_KEY = 'review-progress-v2';
let mastered = new Set();
let currentSection = 'practice';
let currentMode = 'flashcard';
let currentModule = 'all';
let currentIndex = 0;
let filteredQuestions = [];
let isFlipped = false;
let shuffleEnabled = false;
let speedReviewTimer = null;

// ===== PATTERN DATA =====
const PATTERNS = [

const FLOW_DIAGRAM = `

    ↓

// Speed trainer snippets (real competition code contexts)

let trainerCurrent = null;
let trainerStartTime = 0;

// ===== INIT =====
function init(){
  loadProgress();
  applyModuleFilter();
  updateAllUI();
  renderPatterns();
  document.getElementById('flowDiagram').textContent = FLOW_DIAGRAM;
  renderExceptions();
  startTrainerRound();
  document.getElementById('skeleton').classList.add('hidden');
  document.getElementById('main').style.display = '';
}

function loadProgress(){
  try{const raw=localStorage.getItem(STORAGE_KEY);if(raw)mastered=new Set(JSON.parse(raw));}catch(e){showError('localStorage读取失败');}
}
function saveProgress(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify([...mastered]));}catch(e){showError('localStorage写入失败');}
}

// ===== SECTION SWITCHING =====
function switchSection(section){
  currentSection = section;
  document.getElementById('navPractice').classList.toggle('active',section==='practice');
  document.getElementById('navPatterns').classList.toggle('active',section==='patterns');
  document.getElementById('sectionPractice').style.display = section==='practice'?'':'none';
  document.getElementById('sectionPatterns').style.display = section==='patterns'?'':'none';
  if(section==='patterns') startTrainerRound();
}
document.getElementById('navPractice').addEventListener('click',()=>switchSection('practice'));
document.getElementById('navPatterns').addEventListener('click',()=>switchSection('patterns'));

// ===== FILTERING =====
function applyModuleFilter(){
  if(currentModule==='wrong'){
    filteredQuestions = QUESTIONS.filter(q=>!mastered.has(q.id));
  }else if(currentModule==='all'){
    filteredQuestions = [...QUESTIONS];
  }else{
    filteredQuestions = QUESTIONS.filter(q=>q.module===currentModule);
  }
  if(shuffleEnabled) shuffleArray(filteredQuestions);
  if(currentIndex>=filteredQuestions.length) currentIndex = Math.max(0,filteredQuestions.length-1);
  if(filteredQuestions.length===0) currentIndex=0;
}
function shuffleArray(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}
function toggleShuffle(enabled){shuffleEnabled=enabled;applyModuleFilter();updateAllUI();}

// ===== ALL UI =====
function updateAllUI(){
  updateProgress();
  updateTabs();
  updateStats();
  updateWrongCount();
  if(currentModule==='wrong'&&filteredQuestions.length===0){
    document.getElementById('flashcardView').style.display='none';
    document.getElementById('overviewView').style.display='none';
    document.getElementById('emptyState').classList.add('visible');
    document.getElementById('emptyTitle').textContent='全部掌握!';
    document.getElementById('emptyDesc').textContent='没有错题了,去其他模块看看吧';
  }else if(filteredQuestions.length===0){
    document.getElementById('flashcardView').style.display='none';
    document.getElementById('overviewView').style.display='none';
    document.getElementById('emptyState').classList.add('visible');
    document.getElementById('emptyTitle').textContent='该模块暂无题目';
    document.getElementById('emptyDesc').textContent='请选择其他模块';
  }else{
    document.getElementById('emptyState').classList.remove('visible');
    if(currentMode==='flashcard'){
      document.getElementById('flashcardView').style.display='';
      document.getElementById('overviewView').style.display='none';
      updateFlashcard();
    }else{
      document.getElementById('flashcardView').style.display='none';
      document.getElementById('overviewView').style.display='';
      updateOverview();
    }
  }
}

function updateProgress(){
  const total=QUESTIONS.length,done=mastered.size,pct=total>0?Math.round(done/total*100):0;
  document.getElementById('progressLabel').textContent=`已掌握 ${done} / ${total}`;
  document.getElementById('progressPct').textContent=`${pct}%`;
  document.getElementById('progressFill').style.width=`${pct}%`;
}
function updateTabs(){
  document.querySelectorAll('#tabs .tab').forEach(btn=>btn.classList.toggle('active',btn.dataset.module===currentModule));
}
function updateStats(){
  if(filteredQuestions.length===0){document.getElementById('statsBar').innerHTML='';return;}
  const q=filteredQuestions[currentIndex];
  const curMastered=q?mastered.has(q.id):false;
  const modMastered=filteredQuestions.filter(q=>mastered.has(q.id)).length;
  document.getElementById('statsBar').innerHTML=
    `<span>当前:<span class="stat-val">${q?'#'+q.id:'-'}</span></span>`+
    `<span>状态:<span class="stat-val">${curMastered?'已掌握':'学习中'}</span></span>`+
    `<span>本组:<span class="stat-val">${modMastered}/${filteredQuestions.length}</span></span>`+
    `<span>得分:<span class="stat-val">${q?q.score:0}分</span></span>`;
}
function updateWrongCount(){
  const count=QUESTIONS.filter(q=>!mastered.has(q.id)).length;
  document.getElementById('wrongCount').textContent=count;
}

// ===== FLASHCARD =====
function updateFlashcard(){
  if(filteredQuestions.length===0)return;
  const q=filteredQuestions[currentIndex];
  isFlipped=false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('cardModule').textContent='模块 '+q.module;
  document.getElementById('cardModule').className='card-module-tag '+q.module;
  document.getElementById('cardId').textContent='#'+q.id+' · '+q.score+'分';
  document.getElementById('cardTitle').textContent=q.title;
  document.getElementById('cardDesc').textContent=q.desc;
  document.getElementById('cardHint').classList.remove('flipped-hidden');
  // Card back
  document.getElementById('cardBack').innerHTML=`
    <div class="answer-label">answer</div>
    <div class="answer-code">${highlightCode(q.answer)}</div>
    <div class="answer-explain">${q.explanation}</div>
    <div class="collapse-section">
      <div class="collapse-header" onclick="toggleCollapse(this)">
        <span>推理过程</span><span class="collapse-arrow">▶</span>
      </div>
      <div class="collapse-body">${formatReasoning(q.reasoning)}</div>
    </div>
    <div class="collapse-section">
      <div class="collapse-header" onclick="toggleCollapse(this)">
        <span>系统上下文</span><span class="collapse-arrow">▶</span>
      </div>
      <div class="collapse-body"><div class="pipeline-diagram">${q.pipeline}</div></div>
    </div>`;
  document.getElementById('navPos').textContent=`${currentIndex+1} / ${filteredQuestions.length}`;
  document.getElementById('btnPrev').disabled=currentIndex<=0;
  document.getElementById('btnNext').disabled=currentIndex>=filteredQuestions.length-1;
  updateStats();
}

function toggleCollapse(header){
  header.classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
}
function formatReasoning(text){
  return text.split('\n').map(line=>`<div class="reasoning-step">${escapeHtml(line)}</div>`).join('');
}

function flipCard(){
  if(filteredQuestions.length===0)return;
  isFlipped=!isFlipped;
  document.getElementById('card').classList.toggle('flipped',isFlipped);
  document.getElementById('cardHint').classList.toggle('flipped-hidden',isFlipped);
}
function markRight(){
  if(filteredQuestions.length===0)return;
  const q=filteredQuestions[currentIndex];mastered.add(q.id);saveProgress();
  updateProgress();updateStats();updateWrongCount();showToast(`#${q.id} 已掌握`);
}
function markWrong(){
  if(filteredQuestions.length===0)return;
  const q=filteredQuestions[currentIndex];mastered.delete(q.id);saveProgress();
  updateProgress();updateStats();updateWrongCount();showToast(`#${q.id} 标记为未掌握`);
}
function nextCard(){
  if(currentIndex<filteredQuestions.length-1){currentIndex++;updateFlashcard();updateStats();}
}
function prevCard(){
  if(currentIndex>0){currentIndex--;updateFlashcard();updateStats();}
}

// ===== OVERVIEW =====
function updateOverview(){
  document.getElementById('overviewList').innerHTML=filteredQuestions.map((q,i)=>{
    const m=mastered.has(q.id);
    return `<div class="overview-item${m?' mastered':''}" onclick="jumpToFlashcard(${i})">
      <div class="oi-header"><span class="oi-id" style="color:var(--module-${q.module})">#${q.id}</span><span class="oi-score">${q.score}分</span></div>
      <div class="oi-title">${q.title}</div>
      <div class="oi-answer" onclick="event.stopPropagation();this.classList.toggle('revealed')">${escapeHtml(q.answer)}</div>
    </div>`;
  }).join('');
}
function jumpToFlashcard(index){currentIndex=index;switchMode('flashcard');updateAllUI();}

// ===== MODE / MODULE SWITCHING =====
function switchMode(mode){
  currentMode=mode;
  document.getElementById('modeFlashcard').classList.toggle('active',mode==='flashcard');
  document.getElementById('modeOverview').classList.toggle('active',mode==='overview');
  updateAllUI();
}
function switchModule(mod){
  currentModule=mod;currentIndex=0;isFlipped=false;applyModuleFilter();updateAllUI();
}
document.getElementById('modeFlashcard').addEventListener('click',()=>switchMode('flashcard'));
document.getElementById('modeOverview').addEventListener('click',()=>switchMode('overview'));
document.querySelectorAll('#tabs .tab').forEach(btn=>btn.addEventListener('click',()=>switchModule(btn.dataset.module)));

// ===== SPEED REVIEW =====
function startSpeedReview(){
  if(speedReviewTimer){stopSpeedReview();return;}
  const btn=document.getElementById('speedReviewBtn'),status=document.getElementById('speedReviewStatus');
  btn.textContent='停止';status.style.display='';
  function cycle(){
    if(!isFlipped){flipCard();speedReviewTimer=setTimeout(()=>{if(currentIndex<filteredQuestions.length-1){nextCard();cycle();}else{stopSpeedReview();}},1500);}
    else{speedReviewTimer=setTimeout(cycle,100);}
  }
  cycle();
}
function stopSpeedReview(){
  clearTimeout(speedReviewTimer);speedReviewTimer=null;
  document.getElementById('speedReviewBtn').textContent='3秒速览';
  document.getElementById('speedReviewStatus').style.display='none';
}

// ===== PATTERNS SECTION =====
function renderPatterns(){
  document.getElementById('patternGrid').innerHTML=PATTERNS.map(p=>`
    <div class="pattern-card">
      <div class="pattern-icon">${p.icon}</div>
      <div class="pattern-name">${p.name}</div>
      <div class="pattern-syntax">${escapeHtml(p.syntax)}</div>
      <div class="pattern-count">出现 ${p.count} · ${p.questions}</div>
      <div class="pattern-tip">${p.tip}</div>
    </div>`).join('');
}

function renderExceptions(){
  document.getElementById('exceptionCards').innerHTML=EXCEPTIONS.map(e=>`
    <div class="exception-card">
      <div class="exception-label">无原代码</div>
      <div class="exception-id">#${e.id}</div>
      <div class="exception-title">${e.title}</div>
      <div class="exception-answer">${escapeHtml(e.answer)}</div>
      <div class="exception-logic">${e.logic}</div>
    </div>`).join('');
}

// ===== SPEED TRAINER =====
function startTrainerRound(){
  const snippet=TRAINER_SNIPPETS[Math.floor(Math.random()*TRAINER_SNIPPETS.length)];
  trainerCurrent=snippet;trainerStartTime=performance.now();
  document.getElementById('trainerTimer').textContent='0.00s';
  document.getElementById('trainerResult').textContent='';
  document.getElementById('trainerCode').innerHTML=snippet.lines.map((line,i)=>
    `<div class="code-line${i===snippet.answerLine?' found':''}" data-line="${i}" style="${i===snippet.answerLine?'display:none':''}">${escapeHtml(line)}</div>`
  ).join('');
  // Show answer line hidden - user needs to click anywhere on the code block
  // Actually, let's show all lines and let user click the right one
  document.getElementById('trainerCode').innerHTML=snippet.lines.map((line,i)=>
    `<div class="code-line" data-line="${i}">${escapeHtml(line)}</div>`
  ).join('');
}

function handleTrainerClick(e){
  if(!trainerCurrent)return;
  const lineEl=e.target.closest('[data-line]');
  if(!lineEl)return;
  const clickedLine=parseInt(lineEl.dataset.line);
  const elapsed=((performance.now()-trainerStartTime)/1000).toFixed(2);
  if(clickedLine===trainerCurrent.answerLine){
    document.getElementById('trainerTimer').textContent=elapsed+'s';
    document.getElementById('trainerResult').innerHTML='<span style="color:var(--accent-code)">正确! 这就是"原代码"行 - 比赛时往上翻找到它,抄下来就是答案</span>';
    lineEl.classList.add('found');
    trainerCurrent=null;
  }else{
    document.getElementById('trainerResult').innerHTML='<span style="color:var(--danger)">不是这行。「原代码」行通常以 # 开头,包含 "原代码" 三个字</span>';
    lineEl.classList.add('wrong');
    setTimeout(()=>lineEl.classList.remove('wrong'),500);
  }
}

// ===== HELPERS =====
function highlightCode(code){
  let html=escapeHtml(code);
  html=html.replace(/(['"])([^'"]*)(['"])/g,'<span class="str">$1$2$3</span>');
  html=html.replace(/(#.+)$/gm,'<span class="cmt">$1</span>');
  html=html.replace(/\b(if|else|elif|for|in|not|and|or|True|False|None|import|from|def|return|class|self|copy|re|result|params|match|objects|text|msg|msgs|res|start_msg|enable_sorting|dht11_data|ultrasonic_data|warehouse_list|warehouse_id|old_quantity|new_quantity|quantity|target|round|list|extend|findall|deepcopy|get|WASTE_CLASSES|WAREHOUSE_MAPPING)\b/g,'<span class="kw">$1</span>');
  return html;
}
function escapeHtml(str){const d=document.createElement('div');d.textContent=str;return d.innerHTML;}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(el._timeout);el._timeout=setTimeout(()=>el.classList.remove('show'),2000);}
function showError(msg){const el=document.getElementById('errorToast');el.textContent=msg;el.classList.add('show');clearTimeout(el._timeout);el._timeout=setTimeout(()=>el.classList.remove('show'),4000);}

// ===== KEYBOARD =====
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(currentSection!=='practice')return;
  switch(e.key){
    case'ArrowRight':nextCard();break;case'ArrowLeft':prevCard();break;
    case' ':_case'Enter':e.preventDefault();flipCard();break;
    case'y':markRight();break;case'n':markWrong();break;
  }
});

// ===== TOUCH SWIPE =====
(function(){
  const card=document.getElementById('card');let sx=0,sy=0,moved=false;
  card.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;moved=false;},{passive:true});
  card.addEventListener('touchmove',e=>{
    if(!sx)return;const dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;
    if(Math.abs(dx)>10||Math.abs(dy)>10)moved=true;
    if(Math.abs(dx)>10&&Math.abs(dx)>Math.abs(dy)*1.5){card.style.transform=isFlipped?`rotateY(180deg) translateX(${dx/5}px)`:`translateX(${dx/5}px)`;card.style.transition='none';}
  },{passive:true});
  card.addEventListener('touchend',e=>{
    card.style.transition='transform .5s cubic-bezier(.16,1,.3,1)';
    if(!moved){flipCard();}else{
      const dx=(e.changedTouches[0]||{clientX:sx}).clientX-sx;
      if(Math.abs(dx)>60){if(dx>0){markRight();}else{markWrong();}}
    }
    card.style.transform='';void card.offsetWidth;card.style.transform=isFlipped?'rotateY(180deg)':'';
    sx=0;sy=0;moved=false;
  });
})();

// ===== BOOT =====
init();
</script>
